# Server
server.port=8088

# CORS - not a Spring Boot auto-config property; configure via WebMvcConfigurer @Bean
# spring.web.cors.allowed-origins=http://localhost:5173

# Spring AI - oMLX (OpenAI-compatible API)
# oMLX exposes an OpenAI-compatible endpoint — point Spring AI's OpenAI client to it.
spring.ai.openai.api-key=admin
spring.ai.openai.base-url=http://localhost:8080
spring.ai.openai.chat.options.model=Qwen3.6-35B-A3B-4bit
spring.ai.openai.chat.options.num-predict=2048
spring.ai.openai.chat.options.temperature=0.3
spring.ai.openai.chat.options.top-p=0.9
spring.ai.openai.chat.options.stream=true

# Embedding model for oMLX
spring.ai.openai.embedding.options.model=nomicai-modernbert-embed-base-bf16

# Redis Vector Store - connection only (store config owned by VectorStoreConfig.java @Bean)
# index-name, initialize-schema, and metadataFields are set in VectorStoreConfig.java
spring.data.redis.host=localhost
spring.data.redis.port=6379
#spring.data.redis.password=redis123
spring.data.redis.repositories.enabled=false

# H2 Database (PoC)
spring.datasource.url=jdbc:h2:mem:itsupport;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.itsupport=DEBUG
logging.level.org.springframework.ai=INFO

# Actuator
management.endpoints.web.exposure.include=health,info

# KB implementation
kb.implementation=redis