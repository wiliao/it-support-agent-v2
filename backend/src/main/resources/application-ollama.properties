# Server
server.port=8088

# Spring Profiles - uncomment to switch providers:
# spring.profiles.active=ollama

# Redis Vector Store - connection only (store config owned by VectorStoreConfig.java @Bean)
# index-name, initialize-schema, and metadataFields are set in VectorStoreConfig.java
spring.data.redis.host=localhost
spring.data.redis.port=6379
#spring.data.redis.password=redis123
spring.data.redis.repositories.enabled=false

# H2 Database (PoC)
spring.datasource.url=jdbc:h2:mem:itsupport;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.itsupport=DEBUG
logging.level.org.springframework.ai=INFO

# Actuator
management.endpoints.web.exposure.include=health,info

# KB implementation
kb.implementation=redis
